    <style>
        :root {
            --bg-dark: #0a0a0a;
            --panel-bg: #161616;
            --led-green: #2ecc71;
            --led-yellow: #f1c40f;
            --led-red: #e74c3c;
            --led-blue: #3498db;
            --text-gray: #888;
        }

        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg-dark); color: #fff; font-family: sans-serif; overflow: hidden; }

        /* 顶部导航 */
        header { height: 45px; background: #222; display: flex; align-items: center; padding: 0 15px; gap: 15px; border-bottom: 1px solid #333; z-index: 100; }
        .nav-btn { padding: 4px 12px; background: #333; cursor: pointer; border-radius: 3px; font-size: 13px; }
        .nav-btn.active { background: var(--led-blue); color: #fff; font-weight: bold; }

        .main-container { display: grid; grid-template-columns: 1fr 320px; height: calc(100vh - 45px); padding: 10px; gap: 10px; box-sizing: border-box; }
        .panel { background: var(--panel-bg); border: 1px solid #2a2a2a; border-radius: 4px; padding: 12px; display: flex; flex-direction: column; overflow: hidden; }

        /* --- 视频区域增强 --- */
        .video-box { 
            flex: 1; 
            background: #000; 
            border-radius: 4px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            position: relative; 
            overflow: hidden;
            border: 1px solid #000;
        }
        video { width: 100%; height: 100%; object-fit: contain; }

        /* Logo 水印 */
        .video-logo {
            position: absolute;
            top: 22px;
            left: 15px;
            width: 100px;
            opacity: 0.8;
            pointer-events: none;
            filter: drop-shadow(0 0 5px rgba(0,0,0,0.5));
        }

        /* 状态徽章 */
        .video-badge {
            position: absolute;
            top: 22px;
            right: 15px;
            padding: 4px 10px;
            border-radius: 3px;
            font-size: 12px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            user-select: none;
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.2);
            transition: 0.3s;
        }
        .badge-dot { width: 8px; height: 8px; border-radius: 50%; }
        
        /* 徽章：直播模式 */
        .badge-live { color: #ff4d4d; }

        .badge-replay .badge-dot { background: var(--led-blue); }

    <script>
        // --- 全局变量 ---
        let currentHls = null;
        const video = document.getElementById('hlsPlayer');

        // --- 1. 信号源切换核心逻辑 ---
        function changeSource() {
            const url = document.getElementById('streamUrl').value.trim();
            if (!url) return;

            // 销毁旧的 HLS 实例以防内存溢出
            if (currentHls) {
                currentHls.destroy();
                currentHls = null;
            }

            // 判断是否为 HLS (.m3u8) 格式
            if (url.toLowerCase().includes('.m3u8')) {
                if (Hls.isSupported()) {
                    currentHls = new Hls();
                    currentHls.loadSource(url);
                    currentHls.attachMedia(video);
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = url;
                }
            } 
            // 处理 MP4 或其他原生支持格式 (如您提供的 mp4 链接)
            else {
                video.src = url;
                video.load();
            }
            
            // 同步切换角标为“Live”或“回放” (如果是mp4通常视为回放)
            if (url.toLowerCase().includes('.mp4')) {
                setPlayMode('REPLAY');
            } else {
                setPlayMode('LIVE');
            }
        }

        // --- 2. 角标控制 ---
        function setPlayMode(mode) {
            const badge = document.getElementById('statusBadge');
            const text = document.getElementById('badgeText');
            if (mode === 'LIVE') {
                badge.className = 'video-badge badge-live';
                text.innerText = 'LIVE';
            } else {
                badge.className = 'video-badge badge-replay';
                text.innerText = '回放';
            }
        }

        function togglePlayMode() {
            const text = document.getElementById('badgeText').innerText;
            setPlayMode(text === 'LIVE' ? 'REPLAY' : 'LIVE');
        }

        // --- 3. 基础导航与时钟 ---
        function showPage(type) {
            const isLive = type === 'live';
            document.getElementById('page-live').classList.toggle('hidden', !isLive);
            document.getElementById('sidebar-live').classList.toggle('hidden', !isLive);
            document.getElementById('page-data').classList.toggle('hidden', isLive);
            document.getElementById('btn-live').classList.toggle('active', isLive);
            document.getElementById('btn-data').classList.toggle('active', !isLive);
            if(!isLive) setTimeout(() => myChart.resize(), 100);
        }

        function tick() {
            const now = new Date();
            document.getElementById('clock').innerText = now.getFullYear() + '-' + 
                String(now.getMonth()+1).padStart(2,'0') + '-' + 
                String(now.getDate()).padStart(2,'0') + ' ' + 
                now.toTimeString().split(' ')[0];
        }
        setInterval(tick, 1000);

        // --- 4. 音频电平模拟 (保留自 v2.1) ---
        const LED_COUNT = 35;
        function initMeters() {
            ['meter-L', 'meter-R'].forEach(id => {
                const track = document.getElementById(id);
                for (let i = 0; i < LED_COUNT; i++) {
                    const seg = document.createElement('div');
                    seg.className = 'led-segment';
                    track.appendChild(seg);
                }
            });
        }
        function updateMeters() {
            ['meter-L', 'meter-R'].forEach(id => {
                const segments = document.getElementById(id).children;
                const level = Math.floor(Math.random() * LED_COUNT);
                for (let i = 0; i < LED_COUNT; i++) {
                    if (i < level) {
                        let color = 'var(--led-green)';
                        if (i > LED_COUNT * 0.85) color = 'var(--led-red)';
                        else if (i > LED_COUNT * 0.65) color = 'var(--led-yellow)';
                        segments[i].style.background = color;
                    } else { segments[i].style.background = '#222'; }
                }
            });
        }

        // --- 5. 图表逻辑 (保留自 v2.1) ---
        const myChart = echarts.init(document.getElementById('trendChart'), 'dark');
        let dataSeries = Array(20).fill(0).map(() => Math.floor(Math.random() * 500 + 1000));
        myChart.setOption({
            backgroundColor: 'transparent',
            xAxis: { type: 'category', boundaryGap: false, data: Array(20).fill('') },
            yAxis: { type: 'value', splitLine: { lineStyle: { color: '#222' } } },
            series: [{ type: 'line', smooth: true, symbol: 'none', areaStyle: { color: 'rgba(52,152,219,0.2)' }, lineStyle: { color: '#3498db' }, data: dataSeries }]
        });

        function updateDashboard() {
            dataSeries.shift();
            dataSeries.push(dataSeries[dataSeries.length-1] + Math.floor(Math.random()*100-45));
            myChart.setOption({ series: [{ data: dataSeries }] });
            // 模拟日志
            const aBox = document.getElementById('auditBox');
            const log = document.createElement('div');
            log.style.padding = '4px 0';
            log.innerHTML = `<span style="color:#666">[${new Date().toLocaleTimeString()}]</span> 信号源 ${video.paused ? '加载中' : '运行稳定'}`;
            aBox.prepend(log);
            if(aBox.children.length > 20) aBox.lastChild.remove();
        }

        // 初始化
        window.onload = () => {
            initMeters();
            setInterval(updateMeters, 100);
            setInterval(updateDashboard, 3000);
            changeSource(); // 初始加载 URL 中的源
            tick();
        };
        window.onresize = () => myChart.resize();
    </script>

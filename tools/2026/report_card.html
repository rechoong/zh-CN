        th { background-color: #f8f9fa; color: var(--text-light); }
        .action-btn { color: var(--primary-color); cursor: pointer; margin-right: 10px; }

    <script>
        // --- 1. 实时时钟功能 ---
        function updateClock() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('zh-CN', { hour12: false });
            document.getElementById('cardClock').innerText = timeStr;
            
            const dateStr = now.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
            document.getElementById('cardDateDetail').innerText = dateStr;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // --- 2. 核心功能：更新卡片 ---
        function generateCard() {
            // 获取核心数据
            const totalReg = document.getElementById('inputTotalReg').value;
            const liveViews = document.getElementById('inputLiveViews').value;
            
            // 获取详细数据
            const newUser = document.getElementById('inputNewUser').value;
            const activeUser = document.getElementById('inputActiveUser').value;
            const startTimes = document.getElementById('inputStartTimes').value;
            const duration = document.getElementById('inputDuration').value;

            // 获取直播信息
            const sectionTitle = document.getElementById('inputSectionTitle').value;
            const liveTime = document.getElementById('inputLiveTime').value;
            const topic = document.getElementById('inputTopic').value;
            const guest = document.getElementById('inputGuest').value;
            const titles = document.getElementById('inputTitles').value;
            const desc = document.getElementById('inputDesc').value;
            const link = document.getElementById('inputLink').value;

            // 更新核心数据
            document.getElementById('cardTotalReg').innerText = totalReg || '0';
            document.getElementById('cardLiveViews').innerText = liveViews || '0';

            // 处理详细数据展示 (根据勾选)
            const subGrid = document.getElementById('subDataGrid');
            subGrid.innerHTML = ''; // 清空旧内容
            
            // 定义详细数据配置
            const subDataItems = [
                { id: 'checkNewUser', val: newUser, label: '新增用户' },
                { id: 'checkActiveUser', val: activeUser, label: '活跃用户' },
                { id: 'checkStartTimes', val: startTimes, label: '启动次数' },
                { id: 'checkDuration', val: duration, label: '使用时长(分)' }
            ];

            // 遍历生成 HTML
            subDataItems.forEach(item => {
                if (document.getElementById(item.id).checked) {
                    const div = document.createElement('div');
                    div.className = 'sub-data-item';
                    div.innerHTML = `
                        <span class="sub-label">${item.label}</span>
                        <span class="sub-val">${item.val || '0'}</span>
                    `;
                    subGrid.appendChild(div);
                }
            });

            // 如果有勾选，显示网格，否则隐藏
            if (subGrid.children.length > 0) {
                subGrid.style.display = 'grid';
            } else {
                subGrid.style.display = 'none';
            }

            // 更新直播信息
            document.getElementById('cardSectionTitle').innerText = sectionTitle;
            document.getElementById('cardLiveTime').innerText = liveTime;
            document.getElementById('cardTopic').innerText = topic;
            document.getElementById('cardGuest').innerText = guest;
            document.getElementById('cardDesc').innerText = desc;

            // 生成头衔标签
            const tagsContainer = document.getElementById('cardTags');
            tagsContainer.innerHTML = '';
            if(titles) {
                const titleArr = titles.split(/\s+/);
                titleArr.forEach(t => {
                    if(t.trim()) {
                        const span = document.createElement('span');
                        span.className = 'tag';
                        span.innerText = t;
                        tagsContainer.appendChild(span);
                    }
                });
            }

            // 生成二维码
            const qrContainer = document.getElementById("qrcode");
            qrContainer.innerHTML = ""; 
            new QRCode(qrContainer, {
                text: link,
                width: 80,
                height: 80,
                colorDark : "#8B0000", 
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });
        }

        // --- 3. 生成图片 ---
        function downloadImage() {
            const cardElement = document.getElementById('share-card');
            setTimeout(() => {
                html2canvas(cardElement, {
                    scale: 2, 
                    useCORS: true,
                    backgroundColor: "#ffffff"
                }).then(canvas => {
                    const link = document.createElement('a');
                    link.download = `乐出东方日报_${document.getElementById('inputDate').value}.png`;
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                });
            }, 500);
        }

        // --- 4. 导出 CSV 报表 ---
        function exportToCSV() {
            if (historyData.length === 0) {
                alert('暂无数据可导出');
                return;
            }

            // 定义表头
            let csvContent = "\uFEFF"; // 添加 BOM 以支持 Excel 打开中文不乱码
            csvContent += "日期,总注册量,直播在线人数";
            
            // 动态添加详细数据的表头
            if (document.getElementById('checkNewUser').checked) csvContent += ",新增用户";
            if (document.getElementById('checkActiveUser').checked) csvContent += ",活跃用户";
            if (document.getElementById('checkStartTimes').checked) csvContent += ",启动次数";
            if (document.getElementById('checkDuration').checked) csvContent += ",使用时长(分)";
            
            csvContent += ",直播主题,嘉宾\n";

            // 添加数据行
            historyData.forEach(row => {
                csvContent += `${row.date},`;
                csvContent += `${row.totalReg},`;
                csvContent += `${row.liveViews},`;

                // 动态添加详细数据
                if (document.getElementById('checkNewUser').checked) csvContent += `${row.newUser || 0},`;
                if (document.getElementById('checkActiveUser').checked) csvContent += `${row.activeUser || 0},`;
                if (document.getElementById('checkStartTimes').checked) csvContent += `${row.startTimes || 0},`;
                if (document.getElementById('checkDuration').checked) csvContent += `${row.duration || 0},`;

                csvContent += `"${row.topic}",${row.guest}\n`;
            });

            // 创建下载链接
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            const url = URL.createObjectURL(blob);
            link.setAttribute("href", url);
            link.setAttribute("download", `乐出东方_历史数据报表_${new Date().getTime()}.csv`);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // --- 5. 历史记录管理 ---
        let historyData = JSON.parse(localStorage.getItem('ledf_history_v5')) || [];

        function saveToHistory() {
            // 获取当前勾选状态和数值
            const newItem = {
                id: Date.now(),
                date: document.getElementById('inputDate').value,
                totalReg: document.getElementById('inputTotalReg').value,
                liveViews: document.getElementById('inputLiveViews').value,
                // 详细数据
                newUser: document.getElementById('inputNewUser').value,
                activeUser: document.getElementById('inputActiveUser').value,
                startTimes: document.getElementById('inputStartTimes').value,
                duration: document.getElementById('inputDuration').value,
                // 直播信息
                topic: document.getElementById('inputTopic').value,
                guest: document.getElementById('inputGuest').value
            };

            historyData.unshift(newItem);
            localStorage.setItem('ledf_history_v5', JSON.stringify(historyData));
            renderHistoryTable();
            alert('数据已保存至本地！');
        }

        function renderHistoryTable() {
            const tbody = document.getElementById('historyBody');
            tbody.innerHTML = '';

            historyData.forEach(item => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${item.date}</td>
                    <td>${item.totalReg}</td>
                    <td>${item.liveViews}</td>
                    <td>${item.topic}</td>
                    <td>
                        <span class="action-btn" onclick="loadHistoryItem(${item.id})">加载</span>
                        <span class="action-btn" style="color:red" onclick="deleteHistoryItem(${item.id})">删除</span>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function loadHistoryItem(id) {
            const item = historyData.find(d => d.id === id);
            if (item) {
                document.getElementById('inputDate').value = item.date;
                document.getElementById('inputTotalReg').value = item.totalReg;
                document.getElementById('inputLiveViews').value = item.liveViews;
                document.getElementById('inputNewUser').value = item.newUser;
                document.getElementById('inputActiveUser').value = item.activeUser;
                document.getElementById('inputStartTimes').value = item.startTimes;
                document.getElementById('inputDuration').value = item.duration;
                document.getElementById('inputTopic').value = item.topic;
                document.getElementById('inputGuest').value = item.guest;
                
                generateCard();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function deleteHistoryItem(id) {
            if(confirm('确定删除这条记录吗？')) {
                historyData = historyData.filter(d => d.id !== id);
                localStorage.setItem('ledf_history_v5', JSON.stringify(historyData));
                renderHistoryTable();
            }
        }

        // --- 6. 页面初始化 ---
        document.getElementById('inputDate').valueAsDate = new Date();
        generateCard();
        renderHistoryTable();

    </script>
</body>
</html>

    // 新增：歌词解析相关变量
    var lyricLines = [];   // 解析后的歌词数组 [{time: 秒数, text: 歌词文本}]
    var currentLyricIndex = -1; // 当前显示的歌词索引
    var audioPlayer = null; // 音频播放器实例
    // 支持的歌词格式后缀（新增SRT，补充全量格式）
    var supportLyricExts = ['lrc', 'srt', 'trc', 'krc', 'qrc', 'ksc', 'kaj'];

    /**
     * 解析不同格式的歌词文件
     * @param {string} lrcText 歌词文本内容
     * @param {string} ext 歌词文件后缀（lrc/srt/trc等）
     * @returns {Array} 解析后的歌词数组
     */
    function parseLyric(lrcText, ext) {
      lyricLines = []; // 清空原有歌词
      // 不同歌词格式的解析逻辑
      switch(ext.toLowerCase()) {
        case 'lrc':
          // 标准LRC歌词解析：[mm:ss.xx] 或 [mm:ss]
          const lrcRegex = /\[(\d{2}):(\d{2})(?:\.(\d{2}))?\]\s*(.*)/g;
          let match;
          while ((match = lrcRegex.exec(lrcText)) !== null) {
            const minutes = parseInt(match[1], 10); // 分钟
            const seconds = parseInt(match[2], 10); // 秒
            const millis = match[3] ? parseInt(match[3], 10) : 0; // 毫秒（可选）
            const text = match[4].trim(); // 歌词文本（去除首尾空格）
            if (text) { // 跳过空歌词行
              const totalSeconds = minutes * 60 + seconds + millis / 100; // 转换为总秒数
              lyricLines.push({ time: totalSeconds, text: text });
            }
          }
          break;
        case 'srt':
          // SRT字幕格式解析：适配标准SRT格式（序号 + 时间轴 + 文本）
          // SRT格式示例：
          // 1
          // 00:01:20,400 --> 00:01:24,700
          // 歌词文本内容
          const srtRegex = /(\d+)\r?\n(\d{2}):(\d{2}):(\d{2}),(\d{3}) --> .*?\r?\n([\s\S]*?)(?:\r?\n\r?\n|$)/g;
          while ((match = srtRegex.exec(lrcText)) !== null) {
            const hours = parseInt(match[2], 10);    // 小时
            const minutes = parseInt(match[3], 10);  // 分钟
            const seconds = parseInt(match[4], 10);  // 秒
            const millis = parseInt(match[5], 10);   // 毫秒
            const text = match[6].trim().replace(/<br\/?>/g, '\n'); // 处理换行
            if (text) {
              const totalSeconds = hours * 3600 + minutes * 60 + seconds + millis / 1000;
              lyricLines.push({ time: totalSeconds, text: text });
            }
          }
          break;
        case 'trc':
          // TRC歌词解析（简化版，根据实际格式调整）
          const trcRegex = /\[(\d+),(\d+)\]\s*(.*)/g;
          while ((match = trcRegex.exec(lrcText)) !== null) {
            const time = parseInt(match[1], 10) / 1000; // 毫秒转秒
            const text = match[3].trim();
            if (text) {
              lyricLines.push({ time: time, text: text });
            }
          }
          break;
        case 'krc':
        case 'qrc':
          // 酷狗/QQ音乐加密歌词（这里做简化处理，实际需解密）
          try {
            // 模拟解密后解析（实际项目需引入对应解密库）
            const decodeText = lrcText; // 实际需解密逻辑
            const krcRegex = /\[(\d{2}):(\d{2})\.(\d{3})\]\s*(.*)/g;
            while ((match = krcRegex.exec(decodeText)) !== null) {
              const minutes = parseInt(match[1], 10);
              const seconds = parseInt(match[2], 10);
              const millis = parseInt(match[3], 10);
              const text = match[4].trim();
              if (text) {
                const totalSeconds = minutes * 60 + seconds + millis / 1000;
                lyricLines.push({ time: totalSeconds, text: text });
              }
            }
          } catch (e) {
            console.error("KRC/QRC歌词解析失败：", e);
            lyricLines = [];
          }
          break;
        case 'ksc':
        case 'kaj':
          // KSC/KAJ歌词解析（简化版）
          const kscRegex = /<time value="(\d+\.?\d*)"\/>\s*<lyric>(.*?)<\/lyric>/g;
          while ((match = kscRegex.exec(lrcText)) !== null) {
            const time = parseFloat(match[1]);
            const text = match[2].trim();
            if (text) {
              lyricLines.push({ time: time, text: text });
            }
          }
          break;
        default:
          console.warn("不支持的歌词格式：", ext);
          return [];
      }
      // 按时间排序歌词（防止歌词文件顺序混乱）
      lyricLines.sort((a, b) => a.time - b.time);
      // 解析完成后立即渲染一次
      renderLyric();
      return lyricLines;
    }

    /**
     * 加载歌词文件（修复：增加跨域兼容+本地歌词兜底）
     * @param {Object} song 歌曲对象（包含各种歌词路径）
     */
    function loadLyric(song) {
      const lyricContent = document.getElementById("lyric-content");
      lyricContent.innerHTML = "加载歌词中...";
      
      // 查找可用的歌词文件路径
      let lyricPath = '';
      let lyricExt = '';
      for (let ext of supportLyricExts) {
        if (song[ext]) {
          lyricPath = song[ext];
          lyricExt = ext;
          break;
        }
      }

      if (!lyricPath) {
        // 兜底：使用示例歌词（避免无歌词情况）
        const defaultLyric = `[00:00.00] 乐出东方(宫廷乐氏司歌)
[00:05.00] 演唱：乐氏集团
[00:10.00] 用我千年古方 护您百年健康
[00:15.00] 复兴乐氏辉煌 再现中药荣光
[00:20.00] 忠孝勤俭 信立天下
[00:25.00] 坚韧聚焦 内求不怨
[00:30.00] 敬畏感恩 利他共赢
[00:35.00] 乐出东方 誉满九州
[00:40.00] 传承经典 创新未来
[00:45.00] 同心同德 共筑辉煌`;
        lyricContent.innerHTML = defaultLyric;
        parseLyric(defaultLyric, 'lrc');
        return;
      }

      // 修复：使用跨域兼容的方式加载歌词（增加error兜底）
      $.ajax({
        url: lyricPath,
        type: "GET",
        dataType: "text",
        crossDomain: true, // 允许跨域
        success: function (data) {
          parseLyric(data, lyricExt); // 解析歌词
        },
        error: function (xhr, status, error) {
          console.error("歌词加载失败：", error);
          // 兜底：使用示例歌词
          const defaultLyric = `[00:00.00] ${song.title}
[00:05.00] 演唱：${song.artist}
[00:10.00] 用我千年古方 护您百年健康
[00:15.00] 复兴乐氏辉煌 再现中药荣光
[00:20.00] 忠孝勤俭 信立天下
[00:25.00] 坚韧聚焦 内求不怨
[00:30.00] 敬畏感恩 利他共赢`;
          lyricContent.innerHTML = "歌词文件加载失败，显示默认歌词";
          parseLyric(defaultLyric, 'lrc');
        }
      });
    }

    /**
     * 渲染歌词到页面（核心修复：增加滚动定位逻辑）
     */
    function renderLyric() {
      const lyricContent = document.getElementById("lyric-content");
      const lyricContainer = document.getElementById("lyric-container");
      
      if (lyricLines.length === 0) {
        lyricContent.innerHTML = "暂无歌词";
        return;
      }
      
      // 构建歌词HTML
      let lyricHtml = "";
      lyricLines.forEach((line, index) => {
        // 给当前播放的歌词添加高亮类
        const activeClass = index === currentLyricIndex ? "lyric-active" : "";
        lyricHtml += `<div class="lyric-line ${activeClass}" data-time="${line.time}" id="lyric-line-${index}">${line.text}</div>`;
      });
      lyricContent.innerHTML = lyricHtml;
      
      // 核心修复：滚动到当前歌词并居中显示
      if (currentLyricIndex >= 0) {
        const activeLine = document.getElementById(`lyric-line-${currentLyricIndex}`);
        if (activeLine) {
          // 计算滚动偏移量：让当前歌词居中
          const scrollTop = activeLine.offsetTop - (lyricContainer.clientHeight / 2) + (activeLine.clientHeight / 2);
          lyricContainer.scrollTop = scrollTop;
        }
      }
    }

    /**
     * 根据音频播放进度更新歌词
     * @param {number} time 音频当前播放时间（秒）
     */
    function updateLyric(time) {
      if (lyricLines.length === 0) return;
      
      // 找到当前时间对应的歌词索引
      let newIndex = -1;
      for (let i = 0; i < lyricLines.length; i++) {
        // 匹配逻辑：当前时间 >= 歌词时间 且 小于下一句歌词时间
        const currentLineTime = lyricLines[i].time;
        const nextLineTime = i + 1 < lyricLines.length ? lyricLines[i + 1].time : Infinity;
        if (time >= currentLineTime && time < nextLineTime) {
          newIndex = i;
          break;
        }
      }
      
      // 只有索引变化时才重新渲染
      if (newIndex !== currentLyricIndex) {
        currentLyricIndex = newIndex;
        renderLyric();
      }
    }

    /**
     * 初始化单曲循环功能（增强版：支持播放器多实例兼容）
     */
    function initSingleCycle() {
      const singleCycleBtn = document.getElementById("singleCycleBtn");
      if (!singleCycleBtn) return;

      // 单曲循环按钮点击事件：切换状态+样式
      singleCycleBtn.addEventListener("click", function() {
        isSingleCycle = !isSingleCycle;
        // 更新按钮样式和提示文字
        if (isSingleCycle) {
          singleCycleBtn.classList.add("active");
          singleCycleBtn.title = "取消单曲循环";
          // 控制台提示当前状态
          console.log("单曲循环已开启");
        } else {
          singleCycleBtn.classList.remove("active");
          singleCycleBtn.title = "单曲循环";
          console.log("单曲循环已关闭");
        }
      });

      /**
       * 绑定音频结束事件（核心单曲循环逻辑）
       */
      function bindAudioEnded() {
        if (!audioPlayer) return;
        // 先移除原有事件，避免重复绑定
        audioPlayer.removeEventListener("ended", handleAudioEnded);
        // 绑定新的结束事件
        audioPlayer.addEventListener("ended", handleAudioEnded);
      }

      /**
       * 音频播放结束处理函数
       */
      function handleAudioEnded() {
        if (isSingleCycle) {
          // 单曲循环：重置播放进度并重新播放
          audioPlayer.currentTime = 0;
          audioPlayer.play().catch(err => {
            console.warn("单曲循环播放失败（需用户交互）：", err);
            // 降级处理：提示用户手动播放
            document.getElementById("lyric-content").innerHTML = "🔊 需点击播放按钮后生效单曲循环";
          });
        }
        // 播放结束隐藏进度条
        document.getElementById("audio-progress-bar").classList.remove("show");
        document.getElementById("audio-progress-bar").style.width = "0%";
      }

      // 立即绑定+延迟兼容绑定（防止音频元素未创建）
      bindAudioEnded();
      setTimeout(bindAudioEnded, 1000);
    }

    /**
     * 初始化顶部彩虹进度条
     */
    function initAudioProgressBar() {
      const progressBar = document.getElementById("audio-progress-bar");
      if (!audioPlayer || !progressBar) return;

      // 监听音频播放进度更新进度条
      audioPlayer.addEventListener("timeupdate", function() {
        if (audioPlayer.duration === 0) return; // 音频未加载完成时跳过
        // 计算播放进度百分比
        const progress = (audioPlayer.currentTime / audioPlayer.duration) * 100;
        progressBar.style.width = `${progress}%`;
      });

      // 播放时显示进度条
      audioPlayer.addEventListener("play", function() {
        progressBar.classList.add("show");
      });

      // 暂停时隐藏进度条
      audioPlayer.addEventListener("pause", function() {
        progressBar.classList.remove("show");
      });

      // 结束时重置进度条
      audioPlayer.addEventListener("ended", function() {
        progressBar.style.width = "0%";
        progressBar.classList.remove("show");
      });
    }

    // 播放器DOM加载完成后初始化
    $(document).ready(function() {
      // 提前加载默认歌词（修复：页面加载后立即显示歌词）
      loadLyric(playlist[0]);

      // 加载播放器核心逻辑
      $.getScript("https://y.choong.net/QPlayer/js/player.js", function() {
        // 修复播放列表背景样式
        function bgChange(){
          var lis= $('.lib');
          for(var i=0; i<lis.length; i+=2){
            lis[i].style.background = 'rgba(246, 246, 246, 0.5)';
          }
        }
        bgChange(); // 立即执行样式修复

        // 初始化单曲循环功能
        initSingleCycle();

        // 修复：增强音频实例获取逻辑（无限轮询直到获取到，增加超时保护）
        let audioCheckTimes = 0; // 检查次数计数器
        function getAudioPlayer() {
          audioPlayer = document.querySelector("#player audio") || 
                        document.querySelector("audio") ||
                        document.getElementById("audio-player");
          
          if (audioPlayer) {
            console.log("音频播放器实例获取成功");
            
            // 监听音频播放进度更新
            audioPlayer.addEventListener("timeupdate", function () {
              updateLyric(this.currentTime); // 根据当前播放时间更新歌词
            });
            
            // 监听音频播放开始事件
            audioPlayer.addEventListener("play", function () {
              // 重新加载当前歌曲的歌词（确保最新）
              loadLyric(playlist[0]);
            });
            
            // 监听音频暂停事件
            audioPlayer.addEventListener("pause", function () {
              console.log("音频已暂停");
            });
            
            // 绑定单曲循环结束事件
            audioPlayer.addEventListener("ended", function() {
              if (isSingleCycle) {
                this.currentTime = 0;
                this.play().catch(err => {
                  console.warn("单曲循环播放失败：", err);
                });
              }
            });
            
            // 初始化彩虹进度条
            initAudioProgressBar();
          } else {
            audioCheckTimes++;
            // 最多检查30次（15秒），避免无限循环
            if (audioCheckTimes < 30) {
              setTimeout(getAudioPlayer, 500);
              console.log(`未找到音频播放器，500ms后重试（第${audioCheckTimes}次）`);
            } else {
              console.error("音频播放器实例获取超时，请检查播放器加载是否正常");
              // 超时兜底：创建临时音频实例（用于测试歌词滚动）
              audioPlayer = new Audio();
              // 手动触发一次歌词渲染
              renderLyric();
            }
          }
        }

        // 立即执行音频实例获取
        getAudioPlayer();

        // 兼容QPlayer初始化逻辑：延迟再次绑定
        setTimeout(() => {
          getAudioPlayer();
        }, 1000);
      });
    });
  </script>

  <!-- ========== 网站运行时长统计 ========== -->
  <script>
    // 秒数转换为年/天/时/分/秒
    function secondToDate(second) {
      if (!second) {
        return [0,0,0,0,0]; // 返回默认数组，避免报错
      }
      var time = [0, 0, 0, 0, 0]; // 时间数组：[年,天,时,分,秒]
      if (second >= 365 * 24 * 3600) {     // 计算年
        time[0] = parseInt(second / (365 * 24 * 3600));
        second %= 365 * 24 * 3600;
      }
      if (second >= 24 * 3600) {           // 计算天
        time[1] = parseInt(second / (24 * 3600));
        second %= 24 * 3600;
      }
      if (second >= 3600) {               // 计算时
        time[2] = parseInt(second / 3600);
        second %= 3600;
      }
      if (second >= 60) {                 // 计算分
        time[3] = parseInt(second / 60);
        second %= 60;
      }
      time[4] = second;                   // 计算秒（简化判断）
      return time;
    }

    // 实时更新网站运行时长
    function setTime() {
      // 网站创建时间（UTC时间：2026年03月11日，月份从0开始，故03改为02）
      var create_time = Math.round(new Date(Date.UTC(2026, 02, 11, 0, 0, 0)).getTime() / 1000);
      // 当前时间戳（+8小时：转换为北京时间）
      var timestamp = Math.round((new Date().getTime() + 8 * 60 * 60 * 1000) / 1000);
      // 计算运行时长（秒）
      var runTime = timestamp - create_time;
      
      // 转换为年/天/时/分/秒
      var time = secondToDate(runTime);
      // 拼接显示文本
      var timeStr = time[0] + '年' + time[1] + '天' + time[2] + '时' + time[3] + '分' + time[4] + '秒';
      // 更新页面显示
      if (document.getElementById("htmer_time")) {
        document.getElementById("htmer_time").innerText = timeStr;
      }
    }

    // 初始化执行一次
    setTime();
    // 每秒更新一次
    setInterval(setTime, 1000);
  </script>
